name: Sync upstream

on:
  schedule:
    # 每天北京时间 04:00 同步（UTC 20:00）
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: alireza0/s-ui
      TARGET_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
    steps:
      - name: Configure default git branch
        run: git config --global init.defaultBranch main

      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Keep fork build workflows disabled
        run: |
          set -euo pipefail
          for workflow in docker.yml release.yml windows.yml; do
            gh workflow disable "$workflow" --repo "$TARGET_REPO" || true
          done

      - name: Add upstream remote
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          # Do not fetch all upstream tags here: fork tags may already exist with
          # the same names but different targets, which makes git fail with
          # "would clobber existing tag". The release step syncs only the latest
          # upstream tag explicitly and force-updates that one tag if needed.
          git fetch --no-tags upstream main

      - name: Sync main from upstream and preserve fork workflows
        run: |
          set -euo pipefail

          fork_head="$(git rev-parse HEAD)"

          # Preserve fork workflows. The fork keeps custom sync/build policy.
          tmp_workflows="$(mktemp -d)"
          if [ -d .github/workflows ]; then
            cp -a .github/workflows/. "$tmp_workflows/"
          fi

          git checkout main
          git reset --hard upstream/main

          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -a "$tmp_workflows/." .github/workflows/
          git add .github/workflows

          if git diff --quiet "$fork_head" -- .; then
            echo "Fork main is already in sync with upstream."
            git reset --hard "$fork_head"
          else
            git commit -m "Sync upstream and keep fork workflow"
            git push --force-with-lease origin main
          fi

      - name: Mirror latest release and assets from upstream
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT

          tag="$(gh release view --repo "$UPSTREAM_REPO" --json tagName --jq '.tagName')"
          echo "Latest upstream release: $tag"

          # Keep the fork tag identical to the upstream release tag. A Git tag is
          # a fixed ref to a release commit/object, not a moving pointer to main.
          upstream_tag_sha="$(git ls-remote --tags "https://github.com/${UPSTREAM_REPO}.git" "refs/tags/${tag}" | awk '{print $1}')"
          upstream_tag_target_sha="$(git ls-remote --tags "https://github.com/${UPSTREAM_REPO}.git" "refs/tags/${tag}^{}" | awk '{print $1}')"
          if [ -z "$upstream_tag_target_sha" ]; then
            upstream_tag_target_sha="$upstream_tag_sha"
          fi
          fork_tag_sha="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}')"
          echo "Upstream tag sha: $upstream_tag_sha"
          echo "Upstream tag target sha: $upstream_tag_target_sha"
          echo "Fork tag sha: ${fork_tag_sha:-missing}"

          tag_synced=false
          if [ -n "$fork_tag_sha" ] && [ "$fork_tag_sha" = "$upstream_tag_sha" ]; then
            echo "Fork tag already matches upstream."
            tag_synced=true
          else
            git fetch --no-tags --force upstream "+refs/tags/${tag}:refs/tags/${tag}"

            if [ -n "${SYNC_TOKEN:-}" ]; then
              # actions/checkout adds a GITHUB_TOKEN extraheader which overrides
              # URL credentials; remove it before using the PAT with workflow scope.
              git config --local --unset-all http.https://github.com/.extraheader || true
              git remote set-url origin "https://x-access-token:${SYNC_TOKEN}@github.com/${TARGET_REPO}.git"
            fi

            if git push --force origin "refs/tags/${tag}:refs/tags/${tag}"; then
              tag_synced=true
            else
              echo "::warning::Could not update fork tag to the exact upstream tag. Add a repo secret named SYNC_TOKEN with repo + workflow permissions, or push the tag manually. Skipping release creation/update to avoid pointing ${tag} at the wrong commit."
            fi
          fi

          if [ "$tag_synced" != "true" ]; then
            exit 0
          fi

          gh release view "$tag" \
            --repo "$UPSTREAM_REPO" \
            --json name,body,isPrerelease \
            > "$workdir/release.json"

          title="$(jq -r '.name // ""' "$workdir/release.json")"
          if [ -z "$title" ] || [ "$title" = "null" ]; then
            title="$tag"
          fi
          prerelease="$(jq -r '.isPrerelease' "$workdir/release.json")"
          jq -r '.body // ""' "$workdir/release.json" > "$workdir/notes.md"

          mkdir -p "$workdir/assets"
          gh release download "$tag" \
            --repo "$UPSTREAM_REPO" \
            --dir "$workdir/assets" \
            --clobber

          if gh release view "$tag" --repo "$TARGET_REPO" >/dev/null 2>&1; then
            echo "Updating fork release: $tag"
            if [ "$prerelease" = "true" ]; then
              gh release edit "$tag" --repo "$TARGET_REPO" --title "$title" --notes-file "$workdir/notes.md" --prerelease
            else
              gh release edit "$tag" --repo "$TARGET_REPO" --title "$title" --notes-file "$workdir/notes.md"
            fi
          else
            echo "Creating fork release: $tag"
            if [ "$prerelease" = "true" ]; then
              gh release create "$tag" --repo "$TARGET_REPO" --title "$title" --notes-file "$workdir/notes.md" --prerelease
            else
              gh release create "$tag" --repo "$TARGET_REPO" --title "$title" --notes-file "$workdir/notes.md"
            fi
          fi

          release_id="$(gh api "repos/${TARGET_REPO}/releases/tags/${tag}" --jq '.id')"
          # GitHub's GITHUB_TOKEN can edit release notes/assets but may be refused
          # when patching release metadata such as target_commitish. That metadata
          # is cosmetic when the tag already matches upstream, so keep the mirror
          # job green and continue after a warning.
          gh api -X PATCH "repos/${TARGET_REPO}/releases/${release_id}" -f target_commitish="$upstream_tag_target_sha" >/dev/null \
            || echo "::warning::Could not patch release target_commitish; continuing because tag/assets are already mirrored."

          if find "$workdir/assets" -type f | grep -q .; then
            gh release upload "$tag" "$workdir/assets"/* --repo "$TARGET_REPO" --clobber
          fi

          # Avoid GitHub marking an older release as latest due to creation order.
          gh release edit "$tag" --repo "$TARGET_REPO" --latest
          echo "Done. Latest release is $tag"
